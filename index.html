<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aditya Dhulipala — Resume</title>
<style>
/* Body = SF Pro */
body {
  font-family: "SF Pro Text", "SF Pro", -apple-system, system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.5;
  max-width: 820px;
  margin: 2rem auto;
  padding: 0 1.5rem;
  color: #000;
}
/* Name (title) = Apple Garamond */
h1 {
  font-family: "Apple Garamond", "EB Garamond", Garamond, serif;
  font-weight: 600;
  letter-spacing: 0.2px;
  font-size: 2.2rem;
  margin-bottom: .2rem;
}
/* All other headings = New York */
h2, h3, h4 {
  font-family: "New York", ui-serif, "Times New Roman", serif;
  font-weight: 600;
  letter-spacing: 0.2px;
}
h2 { font-size: 1.4rem; border-bottom: 1px solid #000; padding-bottom: .2rem; margin-top: 1.8rem; }
h3 { font-size: 1.15rem; margin-bottom: .1rem; }
h4 { font-size: 1.02rem; color: #000; margin-top: 1.1rem; margin-bottom:.3rem; }
/* Bold inline terms stay in SF Pro */
strong { font-family: inherit; font-weight: 600; }
a { color: #000; text-decoration: none; }
p:first-of-type a:last-child { white-space: nowrap; }
hr { border: none; border-top: 1px solid #000; margin: 1.2rem 0; }
ul { padding-left: 1.2rem; }
li { margin: .25rem 0; }
code { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: .92em; }
.error { color:#000; font-family: ui-monospace, Menlo, monospace; white-space: pre-wrap; }
@media print { body { margin: 0; max-width: none; } a { color:#000; } }
</style>
</head>
<body>
<div id="content">Loading…</div>

<!-- Markdown renderer (pinned) -->
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
  // Edit aditya-resume.md and reload — this page re-renders it with the styling above.
  const MD_FILE = "aditya-resume.md";
  fetch(MD_FILE + "?v=" + Date.now())            // cache-bust so edits show immediately
    .then(r => { if (!r.ok) throw new Error(r.status + " " + r.statusText); return r.text(); })
    .then(md => {
      marked.setOptions({ gfm: true, breaks: false });
      document.getElementById("content").innerHTML = marked.parse(md);
      document.title = (md.match(/^#\s+(.+)$/m)?.[1] || "Resume") + " — Resume";
    })
    .catch(e => {
      document.getElementById("content").innerHTML =
        '<p class="error">Could not load ' + MD_FILE + ' (' + e.message +
        ').\nServe over http (not file://): run  python3 -m http.server  in this folder, ' +
        'or view it on GitHub Pages.</p>';
    });
</script>
</body>
</html>
